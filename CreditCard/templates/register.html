{% extends "nav.html" %}
{% block content %}
{% load static %}




 <!-- contact section start -->
 <div class="Contact_section layout_padding">
    <div class="container">
      <h1 class="categories_text">Register</h1>
      
      <div class="email_box">
        <div class="input_main">
          <div class="container">
            <form method="post">
                {% csrf_token %}
              <div class="form-group">
                <input type="text" class="email-bt" placeholder="First Name" name="fname">
              </div>
              <div class="form-group">
                <input type="text" class="email-bt" placeholder="Last Name" name="lname">
              </div>
              <div class="form-group">
                <input type="text" class="email-bt" placeholder="Username" name="uname">
              </div>
              
              <div class="form-group">
                <input type="email" class="email-bt" placeholder="Email Address" name="email">
              </div>
              <div class="form-group">
                <input type="password" class="email-bt" placeholder="Password" name="psw">
              </div>
              <div class="form-group">
                <input type="password" class="email-bt" placeholder="Confirm Password" name="psw1">
              </div>
              <input type="submit" style="width: 100%;
    float: left;
    font-size: 18px;
    color: #ffffff;
    background-color: #d1b75e;
    text-align: center;
    padding: 10px 0px;
    border-radius: 40px;
    margin-top: 20px;
    text-transform: uppercase;" value="Register">                  
        
            </form>   
          </div> 
          </div>
      </div>
    </div>
  </div>
  <!-- contact section end -->
 
{% for i in messages %}
<script>alert("{{i}}")</script>

{% endfor %}



{% endblock %}
